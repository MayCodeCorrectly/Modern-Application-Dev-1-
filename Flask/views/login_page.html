<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Here</title>
</head>
<body>
    <form method="post" action="/greetings/">
    <!-- <form method="post"> This will throw error -->
        <!-- "action" describes what to do after submission  -->
        <label>First Name : <input type="text" name="user_fname" required></label><br>
        <label>Surname : <input type="text" name="user_lname"></label>
        <p>Gender: <br>
            <label><input type="radio" value="male" name="gender">Male</label><br>
            <label><input type="radio" value="female" name="gender">Female</label><br>
            <label><input type="radio" value="other" name="gender">Other</label>
        </p>
        <label><input type="submit" value="Submit"></label>
    </form>
</body>
</html>
